<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pregunta importante</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background-color: #ffe6e6;
      overflow: hidden;
    }
    h1 {
      margin-top: 100px;
      font-size: 40px;
    }
    button {
      font-size: 20px;
      padding: 10px 20px;
      position: absolute;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    #si {
      background-color: #4CAF50;
      color: white;
      left: 40%;
      top: 50%;
    }
    #no {
      background-color: #f44336;
      color: white;
      left: 55%;
      top: 50%;
    }
  </style>
</head>
<body>

  <h1>¿Querés ser mi novia? 💖</h1>

  <button id="si" onclick="location.href='si.html'">Sí 😍</button>
  <button id="no">No 😢</button>

  <script>
    const noBtn = document.getElementById("no");

    noBtn.addEventListener("mouseover", () => {
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 50);
      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    });
  </script>

</body>
</html>
